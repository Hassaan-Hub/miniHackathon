<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — MaintainIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Users</h2>
        <p style="color:#64748b;font-size:0.875rem;">Manage team members and their roles</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="userStats">
      <div class="stat-card">
        <div class="stat-icon" style="background:#eff6ff;color:#2563eb;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="totalUsers">-</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#f0fdf4;color:#16a34a;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="adminCount">-</div>
          <div class="stat-label">Admins</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fef3c7;color:#d97706;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="techCount">-</div>
          <div class="stat-label">Technicians</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#faf5ff;color:#9333ea;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="managerCount">-</div>
          <div class="stat-label">Managers</div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <input type="text" placeholder="Search by name or email..." id="searchInput" style="min-width:250px;">
      <select id="roleFilter">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="manager">Manager</option>
        <option value="technician">Technician</option>
        <option value="reporter">Reporter</option>
      </select>
    </div>

    <!-- Users Table -->
    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Phone</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-list">
            <tr><td colspan="6" style="text-align:center;padding:2rem;"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Edit Role Modal -->
  <div class="modal-overlay" id="roleModal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h3>Change User Role</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editUserId">
        <p style="font-size:0.875rem;color:#64748b;margin-bottom:1rem;">User: <strong id="editUserName"></strong></p>
        <div class="input-group">
          <label>Role</label>
          <select id="editUserRole">
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="technician">Technician</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('roleModal').classList.remove('active')">Cancel</button>
        <button class="btn btn-primary" id="saveRoleBtn">Save Role</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from '/js/firebase-config.js';
    import { collection, query, where, onSnapshot, updateDoc, doc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { requireRole } from '/js/middleware.js';
    import { setupNav, populateUser, setupMobileMenu, getSidebar } from '/js/middleware.js';
    import { showToast, statusBadge, esc, formatDate, openModal, closeModal, setupModals } from '/js/utils.js';

    let currentOrgId = null;
    let currentUserId = null;
    let usersData = {};

    const roleColors = {
      admin: 'badge-danger',
      manager: 'badge-warning',
      technician: 'badge-info',
      reporter: 'badge-secondary'
    };

    requireRole(['admin', 'manager'], async (user, userData) => {
      currentUserId = user.uid;
      document.getElementById('sidebar').innerHTML = getSidebar('users', userData.role);
      setupNav('users');
      populateUser(userData);
      setupMobileMenu();
      setupModals();

      currentOrgId = userData.orgId;

      // Load users in real-time
      const q = query(collection(db, 'users'), where('orgId', '==', currentOrgId));
      onSnapshot(q, (snap) => {
        usersData = {};
        snap.forEach(d => { usersData[d.id] = { id: d.id, ...d.data() }; });
        renderUsers();
        updateStats();
      });

      // Filters
      document.getElementById('searchInput').addEventListener('input', renderUsers);
      document.getElementById('roleFilter').addEventListener('change', renderUsers);

      // Save role
      document.getElementById('saveRoleBtn').addEventListener('click', saveRole);
    });

    function updateStats() {
      const users = Object.values(usersData);
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('adminCount').textContent = users.filter(u => u.role === 'admin').length;
      document.getElementById('techCount').textContent = users.filter(u => u.role === 'technician').length;
      document.getElementById('managerCount').textContent = users.filter(u => u.role === 'manager').length;
    }

    function renderUsers() {
      const tbody = document.getElementById('users-list');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const role = document.getElementById('roleFilter').value;

      let filtered = Object.values(usersData).filter(u => {
        if (search && !u.name?.toLowerCase().includes(search) && !u.email?.toLowerCase().includes(search)) return false;
        if (role && u.role !== role) return false;
        return true;
      });

      // Sort: admins first, then managers, then technicians
      const roleOrder = { admin: 0, manager: 1, technician: 2, reporter: 3 };
      filtered.sort((a, b) => (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9));

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><h3>No users found</h3><p>Users in your organization will appear here</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(u => {
        const initials = (u.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
        const isSelf = u.id === currentUserId;

        return `<tr style="${isSelf ? 'background:#f0fdf4;' : ''}">
          <td>
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <div style="width:36px;height:36px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.75rem;color:#475569;overflow:hidden;">
                ${u.photoUrl ? `<img src="${u.photoUrl}" style="width:100%;height:100%;object-fit:cover;">` : initials}
              </div>
              <div>
                <div style="font-weight:500;">${esc(u.name || 'Unknown')}${isSelf ? ' <span style="font-size:0.75rem;color:#16a34a;">(You)</span>' : ''}</div>
              </div>
            </div>
          </td>
          <td style="color:#64748b;">${esc(u.email || 'N/A')}</td>
          <td><span class="badge ${roleColors[u.role] || 'badge-secondary'}">${esc((u.role || 'unknown').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()))}</span></td>
          <td style="color:#64748b;font-size:0.8125rem;">${esc(u.phone || 'N/A')}</td>
          <td style="color:#64748b;font-size:0.8125rem;">${formatDate(u.createdAt)}</td>
          <td>
            ${!isSelf ? `<button class="btn btn-secondary btn-xs" onclick="window.openRoleModal('${u.id}')" title="Change Role">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Role
            </button>` : '<span style="color:#94a3b8;font-size:0.75rem;">—</span>'}
          </td>
        </tr>`;
      }).join('');
    }

    window.openRoleModal = function(userId) {
      const user = usersData[userId];
      if (!user) return;
      document.getElementById('editUserId').value = userId;
      document.getElementById('editUserName').textContent = user.name || user.email;
      document.getElementById('editUserRole').value = user.role || 'technician';
      openModal('roleModal');
    };

    async function saveRole() {
      const userId = document.getElementById('editUserId').value;
      const newRole = document.getElementById('editUserRole').value;
      if (!userId || !newRole) return;

      const btn = document.getElementById('saveRoleBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        await updateDoc(doc(db, 'users', userId), {
          role: newRole,
          updatedAt: serverTimestamp()
        });
        showToast('Role updated successfully', 'success');
        closeModal('roleModal');
      } catch (err) {
        console.error(err);
        showToast('Error updating role: ' + err.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Save Role';
    }
  </script>
</body>
</html>
