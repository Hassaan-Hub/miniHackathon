<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets — MaintainIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Assets</h2>
        <p style="color:#64748b;font-size:0.875rem;">Manage all physical assets and their QR codes</p>
      </div>
      <button class="btn btn-primary btn-sm" id="addAssetBtn">+ Add Asset</button>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <input type="text" placeholder="Search assets..." id="searchInput" style="min-width:200px;">
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option>HVAC</option>
        <option>Electrical</option>
        <option>Plumbing</option>
        <option>IT Equipment</option>
        <option>Furniture</option>
        <option>Vehicle</option>
        <option>Medical</option>
        <option>Kitchen</option>
        <option>Other</option>
      </select>
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="operational">Operational</option>
        <option value="under_maintenance">Under Maintenance</option>
        <option value="out_of_service">Out of Service</option>
      </select>
    </div>

    <!-- Assets Table -->
    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Asset</th>
              <th>Category</th>
              <th>Location</th>
              <th>Status</th>
              <th>Issues</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assets-list">
            <tr><td colspan="6" style="text-align:center;padding:2rem;"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add/Edit Asset Modal -->
  <div class="modal-overlay" id="assetModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Asset</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="assetForm">
          <input type="hidden" id="assetId">
          <div class="input-group">
            <label>Asset Name *</label>
            <input type="text" id="assetName" placeholder="e.g. AC Unit - Room 204" required>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="input-group">
              <label>Category *</label>
              <select id="assetCategory" required>
                <option value="">Select...</option>
                <option>HVAC</option>
                <option>Electrical</option>
                <option>Plumbing</option>
                <option>IT Equipment</option>
                <option>Furniture</option>
                <option>Vehicle</option>
                <option>Medical</option>
                <option>Kitchen</option>
                <option>Other</option>
              </select>
            </div>
            <div class="input-group">
              <label>Status</label>
              <select id="assetStatus">
                <option value="operational">Operational</option>
                <option value="under_maintenance">Under Maintenance</option>
                <option value="out_of_service">Out of Service</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label>Location (Building, Floor, Room)</label>
            <input type="text" id="assetLocation" placeholder="e.g. Main Building, 2nd Floor, Room 204">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="input-group">
              <label>Install Date</label>
              <input type="date" id="assetInstallDate">
            </div>
            <div class="input-group">
              <label>Warranty Expiry</label>
              <input type="date" id="assetWarranty">
            </div>
          </div>
          <div class="input-group">
            <label>Asset Photo</label>
            <div class="image-upload-area" id="photoUploadArea">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <p style="font-size:0.875rem;color:#64748b;">Click to upload photo</p>
            </div>
            <input type="file" id="assetPhoto" accept="image/*" style="display:none;">
            <div class="preview-grid" id="photoPreview"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('assetModal').classList.remove('active')">Cancel</button>
        <button class="btn btn-primary" id="saveAssetBtn">Save Asset</button>
      </div>
    </div>
  </div>

  <!-- QR Code Modal -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <h3>Asset QR Code</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="qr-display" id="qrDisplay"></div>
        <p style="text-align:center;font-size:0.8125rem;color:#64748b;margin-top:0.75rem;" id="qrAssetName"></p>
        <p style="text-align:center;font-size:0.75rem;color:#94a3b8;margin-top:0.25rem;">Scan to view asset & report issues</p>
        <div style="text-align:center;margin-top:1rem;">
          <button class="btn btn-primary btn-sm" id="downloadQr">Download QR Code</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from '/js/firebase-config.js';
    import { collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { requireRole } from '/js/middleware.js';
    import { setupNav, populateUser, setupMobileMenu, getSidebar } from '/js/middleware.js';
    import { showToast, statusBadge, esc, openModal, closeModal, setupModals, uploadFile } from '/js/utils.js';

    // QR code lib
    const QRCodeScript = document.createElement('script');
    QRCodeScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    document.head.appendChild(QRCodeScript);

    let currentOrgId = null;
    let assetsData = {};

    requireRole(['admin', 'manager'], async (user, userData) => {
      document.getElementById('sidebar').innerHTML = getSidebar('assets', userData.role);
      setupNav('assets');
      populateUser(userData);
      setupMobileMenu();
      setupModals();

      currentOrgId = userData.orgId;

      // Load assets in real-time
      const q = query(collection(db, 'assets'), where('orgId', '==', currentOrgId), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snap) => {
        assetsData = {};
        snap.forEach(d => { assetsData[d.id] = { id: d.id, ...d.data() }; });
        renderAssets();
      });

      // Add asset button
      document.getElementById('addAssetBtn').addEventListener('click', () => {
        document.getElementById('assetForm').reset();
        document.getElementById('assetId').value = '';
        document.getElementById('modalTitle').textContent = 'Add New Asset';
        document.getElementById('photoPreview').innerHTML = '';
        openModal('assetModal');
      });

      // Photo upload
      const photoArea = document.getElementById('photoUploadArea');
      const photoInput = document.getElementById('assetPhoto');
      photoArea.addEventListener('click', () => photoInput.click());
      photoInput.addEventListener('change', handlePhotoPreview);

      // Save asset
      document.getElementById('saveAssetBtn').addEventListener('click', saveAsset);

      // Filters
      document.getElementById('searchInput').addEventListener('input', renderAssets);
      document.getElementById('categoryFilter').addEventListener('change', renderAssets);
      document.getElementById('statusFilter').addEventListener('change', renderAssets);
    });

    function handlePhotoPreview(e) {
      const preview = document.getElementById('photoPreview');
      preview.innerHTML = '';
      const file = e.target.files[0];
      if (file) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      }
    }

    async function saveAsset() {
      const btn = document.getElementById('saveAssetBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const id = document.getElementById('assetId').value;
        const photoInput = document.getElementById('assetPhoto');
        let photoUrl = '';

        if (photoInput.files[0]) {
          photoUrl = await uploadFile(photoInput.files[0], `assets/${currentOrgId}/${Date.now()}`);
        }

        const data = {
          orgId: currentOrgId,
          name: document.getElementById('assetName').value.trim(),
          category: document.getElementById('assetCategory').value,
          location: document.getElementById('assetLocation').value.trim(),
          status: document.getElementById('assetStatus').value,
          installDate: document.getElementById('assetInstallDate').value || null,
          warrantyExpiry: document.getElementById('assetWarranty').value || null,
          updatedAt: serverTimestamp()
        };

        if (photoUrl) data.photoUrl = photoUrl;

        if (id) {
          await updateDoc(doc(db, 'assets', id), data);
          showToast('Asset updated successfully', 'success');
        } else {
          data.createdAt = serverTimestamp();
          const ref = await addDoc(collection(db, 'assets'), data);
          // Update with QR code URL
          const qrUrl = `${window.location.origin}/asset.html?id=${ref.id}`;
          await updateDoc(doc(db, 'assets', ref.id), { qrCodeUrl: qrUrl });
          showToast('Asset created successfully', 'success');
        }

        closeModal('assetModal');
        document.getElementById('assetForm').reset();
      } catch (err) {
        console.error(err);
        showToast('Error saving asset: ' + err.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Save Asset';
    }

    function renderAssets() {
      const tbody = document.getElementById('assets-list');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const status = document.getElementById('statusFilter').value;

      let filtered = Object.values(assetsData).filter(a => {
        if (search && !a.name?.toLowerCase().includes(search) && !a.location?.toLowerCase().includes(search)) return false;
        if (category && a.category !== category) return false;
        if (status && a.status !== status) return false;
        return true;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><h3>No assets found</h3><p>Add your first asset to get started</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(a => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <div style="width:40px;height:40px;border-radius:0.5rem;background:#f1f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden;">
                ${a.photoUrl ? `<img src="${a.photoUrl}" style="width:100%;height:100%;object-fit:cover;">` :
                  '<svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="width:20px;height:20px;"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>'}
              </div>
              <div>
                <div style="font-weight:500;">${esc(a.name)}</div>
              </div>
            </div>
          </td>
          <td><span class="badge badge-secondary">${esc(a.category || 'N/A')}</span></td>
          <td style="color:#64748b;font-size:0.8125rem;">${esc(a.location || 'N/A')}</td>
          <td>${statusBadge(a.status || 'operational')}</td>
          <td id="issue-count-${a.id}">-</td>
          <td>
            <div style="display:flex;gap:0.375rem;">
              <button class="btn btn-secondary btn-xs" onclick="viewQR('${a.id}')" title="QR Code">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
              </button>
              <button class="btn btn-secondary btn-xs" onclick="editAsset('${a.id}')" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-secondary btn-xs" onclick="deleteAsset('${a.id}')" title="Delete" style="color:#dc2626;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
              </button>
              <a href="/asset-detail.html?id=${a.id}" class="btn btn-secondary btn-xs" title="Detail">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </a>
            </div>
          </td>
        </tr>
      `).join('');

      // Load issue counts
      filtered.forEach(async a => {
        const issuesSnap = await getDocs(query(collection(db, 'issues'), where('assetId', '==', a.id), where('status', 'in', ['reported', 'triaged', 'assigned', 'in_progress'])));
        const el = document.getElementById(`issue-count-${a.id}`);
        if (el) el.innerHTML = issuesSnap.size > 0 ? `<span class="badge badge-danger">${issuesSnap.size}</span>` : '<span style="color:#64748b;">0</span>';
      });
    }

    // Global functions for inline handlers
    window.editAsset = function(id) {
      const asset = assetsData[id];
      if (!asset) return;
      document.getElementById('assetId').value = id;
      document.getElementById('assetName').value = asset.name || '';
      document.getElementById('assetCategory').value = asset.category || '';
      document.getElementById('assetLocation').value = asset.location || '';
      document.getElementById('assetStatus').value = asset.status || 'operational';
      document.getElementById('assetInstallDate').value = asset.installDate || '';
      document.getElementById('assetWarranty').value = asset.warrantyExpiry || '';
      document.getElementById('modalTitle').textContent = 'Edit Asset';
      document.getElementById('photoPreview').innerHTML = asset.photoUrl ? `<img src="${asset.photoUrl}">` : '';
      openModal('assetModal');
    };

    window.deleteAsset = async function(id) {
      if (!confirm('Are you sure you want to delete this asset?')) return;
      try {
        await deleteDoc(doc(db, 'assets', id));
        showToast('Asset deleted', 'success');
      } catch (err) {
        showToast('Error deleting asset', 'error');
      }
    };

    window.viewQR = function(id) {
      const asset = assetsData[id];
      if (!asset) return;

      const qrUrl = `${window.location.origin}/asset.html?id=${id}`;
      const display = document.getElementById('qrDisplay');
      display.innerHTML = '';

      // Wait for QR library to load
      const generateQR = () => {
        if (typeof QRCode === 'undefined') {
          setTimeout(generateQR, 100);
          return;
        }
        new QRCode(display, {
          text: qrUrl,
          width: 200,
          height: 200,
          colorDark: '#0f172a',
          colorLight: '#ffffff'
        });
      };
      generateQR();

      document.getElementById('qrAssetName').textContent = asset.name;
      openModal('qrModal');

      // Download handler
      document.getElementById('downloadQr').onclick = () => {
        const canvas = display.querySelector('canvas');
        if (canvas) {
          const link = document.createElement('a');
          link.download = `QR-${asset.name.replace(/\s+/g, '_')}.png`;
          link.href = canvas.toDataURL();
          link.click();
        }
      };
    };
  </script>
</body>
</html>
