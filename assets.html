<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Assets</h2>
        <p class="text-slate-500 text-sm">Manage all physical assets and their QR codes</p>
      </div>
      <button class="btn btn-primary btn-sm" id="addAssetBtn">+ Add Asset</button>
    </div>

    <div class="filter-bar">
      <input type="text" placeholder="Search assets..." id="searchInput">
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option>HVAC</option>
        <option>Electrical</option>
        <option>Plumbing</option>
        <option>IT Equipment</option>
        <option>Furniture</option>
        <option>Vehicle</option>
        <option>Medical</option>
        <option>Kitchen</option>
        <option>Other</option>
      </select>
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="operational">Operational</option>
        <option value="under_maintenance">Under Maintenance</option>
        <option value="out_of_service">Out of Service</option>
      </select>
    </div>

    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Asset</th>
              <th>Category</th>
              <th>Location</th>
              <th>Status</th>
              <th>Issues</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assets-list">
            <tr><td colspan="6" class="text-center p-8"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="assetModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Asset</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="assetForm">
          <input type="hidden" id="assetId">
          <div class="input-group">
            <label>Asset Name *</label>
            <input type="text" id="assetName" placeholder="e.g. AC Unit - Room 204" required>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="input-group">
              <label>Category *</label>
              <select id="assetCategory" required>
                <option value="">Select...</option>
                <option>HVAC</option>
                <option>Electrical</option>
                <option>Plumbing</option>
                <option>IT Equipment</option>
                <option>Furniture</option>
                <option>Vehicle</option>
                <option>Medical</option>
                <option>Kitchen</option>
                <option>Other</option>
              </select>
            </div>
            <div class="input-group">
              <label>Status</label>
              <select id="assetStatus">
                <option value="operational">Operational</option>
                <option value="under_maintenance">Under Maintenance</option>
                <option value="out_of_service">Out of Service</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label>Location (Building, Floor, Room)</label>
            <input type="text" id="assetLocation" placeholder="e.g. Main Building, 2nd Floor, Room 204">
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="input-group">
              <label>Install Date</label>
              <input type="date" id="assetInstallDate">
            </div>
            <div class="input-group">
              <label>Warranty Expiry</label>
              <input type="date" id="assetWarranty">
            </div>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelAssetBtn">Cancel</button>
        <button class="btn btn-primary" id="saveAssetBtn">Save Asset</button>
      </div>
    </div>
  </div>



  <div class="modal-overlay" id="qrModal">
    <div class="modal max-w-[380px]">
      <div class="modal-header">
        <h3>Asset QR Code</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="qr-display" id="qrDisplay"></div>
        <p class="text-center text-xs text-slate-500 mt-3" id="qrAssetName"></p>
        <p class="text-center text-[0.6875rem] text-slate-400 mt-1">Scan to view asset & report issues</p>
        <div class="text-center mt-4">
          <button class="btn btn-primary btn-sm" id="downloadQr">Download QR Code</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/assets.js"></script>
</body>
</html>
