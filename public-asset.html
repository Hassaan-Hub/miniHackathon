<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset — MaintainIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
  <style>
    body { margin: 0; }
    .public-footer {
      background: #0f172a;
      color: #64748b;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8125rem;
    }
    .public-footer a { color: #60a5fa; text-decoration: none; }
    .tab-btns { display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:1.5rem; }
    .tab-btns button { padding:0.75rem 1.25rem;border:none;background:none;font-weight:500;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;font-size:0.9375rem; }
    .tab-btns button.active { color:#2563eb;border-bottom-color:#2563eb; }
  </style>
</head>
<body>
  <div class="public-asset-page">
    <!-- Header -->
    <div class="public-header">
      <div style="display:flex;align-items:center;gap:0.5rem;justify-content:center;margin-bottom:0.5rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span style="font-weight:700;">MaintainIQ</span>
      </div>
      <h1 id="assetName">Loading...</h1>
      <p id="assetLocation"></p>
    </div>

    <div style="max-width:600px;margin:0 auto;padding:1rem;">
      <!-- Loading -->
      <div id="loadingState" style="text-align:center;padding:3rem;">
        <div class="spinner"></div>
        <p style="color:#64748b;margin-top:1rem;">Loading asset details...</p>
      </div>

      <!-- Not Found -->
      <div id="notFoundState" style="display:none;text-align:center;padding:3rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="width:64px;height:64px;margin:0 auto 1rem;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <h3 style="font-weight:600;margin-bottom:0.5rem;">Asset Not Found</h3>
        <p style="color:#64748b;">This asset may have been removed or the QR code is invalid.</p>
      </div>

      <!-- Asset Content -->
      <div id="assetContent" style="display:none;">
        <!-- Asset Photo -->
        <div id="assetPhotoSection" style="margin-bottom:1.25rem;display:none;">
          <img id="assetPhoto" alt="" style="width:100%;height:200px;object-fit:cover;border-radius:0.75rem;">
        </div>

        <!-- Asset Info Card -->
        <div class="card" style="margin-bottom:1.25rem;">
          <div class="card-body">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
              <h2 id="assetTitle" style="font-weight:700;font-size:1.25rem;"></h2>
              <span class="asset-status-indicator" id="assetStatus"></span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;font-size:0.875rem;">
              <div>
                <span style="color:#64748b;">Category</span>
                <div style="font-weight:500;" id="assetCategory">-</div>
              </div>
              <div>
                <span style="color:#64748b;">Location</span>
                <div style="font-weight:500;" id="assetLocationInfo">-</div>
              </div>
              <div>
                <span style="color:#64748b;">Installed</span>
                <div style="font-weight:500;" id="assetInstall">-</div>
              </div>
              <div>
                <span style="color:#64748b;">Warranty</span>
                <div style="font-weight:500;" id="assetWarranty">-</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Report Issue Button -->
        <button class="btn btn-primary" id="reportBtn" style="width:100%;margin-bottom:1.25rem;padding:0.875rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Report an Issue
        </button>

        <!-- Tabs -->
        <div class="tab-btns">
          <button class="active" data-tab="report">Report Issue</button>
          <button data-tab="history">Service History</button>
          <button data-tab="issues">Open Issues</button>
        </div>

        <!-- Report Form -->
        <div id="tab-report">
          <div class="card">
            <div class="card-body">
              <form id="reportForm">
                <div class="input-group">
                  <label>Describe the Issue *</label>
                  <textarea id="reportDesc" rows="4" placeholder="What's wrong? Be as specific as possible..." required></textarea>
                </div>
                <div class="input-group">
                  <label>Urgency Level</label>
                  <select id="reportUrgency">
                    <option value="low">Low — Minor issue, not urgent</option>
                    <option value="medium" selected>Medium — Needs attention soon</option>
                    <option value="high">High — Affecting operations</option>
                    <option value="critical">Critical — Safety hazard / completely broken</option>
                  </select>
                </div>
                <div class="input-group">
                  <label>Photo Evidence (optional)</label>
                  <input type="file" id="reportPhotos" accept="image/*" multiple>
                  <div class="preview-grid" id="reportPhotoPreview"></div>
                </div>
                <div class="input-group">
                  <label>Your Name (optional)</label>
                  <input type="text" id="reportName" placeholder="Anonymous">
                </div>
                <div class="input-group">
                  <label>Contact (optional)</label>
                  <input type="text" id="reportContact" placeholder="Phone or email for follow-up">
                </div>
                <button type="submit" class="btn btn-primary" id="submitReport" style="width:100%;">
                  Submit Report
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Service History -->
        <div id="tab-history" style="display:none;">
          <div id="historyList">
            <div class="spinner"></div>
          </div>
        </div>

        <!-- Open Issues -->
        <div id="tab-issues" style="display:none;">
          <div id="openIssuesList">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="public-footer">
      Powered by <a href="/">MaintainIQ</a> — Smart Maintenance Management
    </div>
  </div>

  <script type="module">
    import { db } from '/js/firebase-config.js';
    import { doc, getDoc, collection, query, where, orderBy, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { showToast, statusBadge, esc, formatDate, formatDateTime, uploadFile } from '/js/utils.js';

    // Get asset ID from URL
    const params = new URLSearchParams(window.location.search);
    const assetId = params.get('id');

    // Also handle hash routing for /asset/{id} pattern
    if (!assetId && window.location.hash) {
      const hashId = window.location.hash.replace('#', '').replace('asset/', '');
      if (hashId) window.location.search = `?id=${hashId}`;
    }

    if (!assetId) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('notFoundState').style.display = 'block';
    } else {
      loadAsset(assetId);
    }

    async function loadAsset(id) {
      try {
        const assetDoc = await getDoc(doc(db, 'assets', id));
        if (!assetDoc.exists()) {
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('notFoundState').style.display = 'block';
          return;
        }

        const asset = assetDoc.data();
        document.getElementById('assetName').textContent = asset.name;
        document.getElementById('assetLocation').textContent = asset.location || '';
        document.title = `${asset.name} — MaintainIQ`;

        // Show content
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('assetContent').style.display = 'block';

        // Fill details
        document.getElementById('assetTitle').textContent = asset.name;
        const statusEl = document.getElementById('assetStatus');
        statusEl.textContent = (asset.status || 'operational').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        statusEl.className = `asset-status-indicator ${asset.status || 'operational'}`;

        document.getElementById('assetCategory').textContent = asset.category || 'N/A';
        document.getElementById('assetLocationInfo').textContent = asset.location || 'N/A';
        document.getElementById('assetInstall').textContent = asset.installDate || 'N/A';
        document.getElementById('assetWarranty').textContent = asset.warrantyExpiry || 'N/A';

        if (asset.photoUrl) {
          document.getElementById('assetPhotoSection').style.display = 'block';
          document.getElementById('assetPhoto').src = asset.photoUrl;
          document.getElementById('assetPhoto').alt = asset.name;
        }

        // Tab switching
        document.querySelectorAll('.tab-btns button').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btns button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-report').style.display = btn.dataset.tab === 'report' ? 'block' : 'none';
            document.getElementById('tab-history').style.display = btn.dataset.tab === 'history' ? 'block' : 'none';
            document.getElementById('tab-issues').style.display = btn.dataset.tab === 'issues' ? 'block' : 'none';

            if (btn.dataset.tab === 'history') loadHistory(id);
            if (btn.dataset.tab === 'issues') loadOpenIssues(id);
          });
        });

        // Report form
        document.getElementById('reportForm').addEventListener('submit', (e) => {
          e.preventDefault();
          submitIssueReport(id, asset.orgId);
        });

        // Photo preview
        document.getElementById('reportPhotos').addEventListener('change', (e) => {
          const preview = document.getElementById('reportPhotoPreview');
          preview.innerHTML = '';
          Array.from(e.target.files).forEach(file => {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            preview.appendChild(img);
          });
        });

        // Scroll to report if hash
        if (window.location.hash === '#report') {
          document.getElementById('reportBtn').scrollIntoView({ behavior: 'smooth' });
        }

      } catch (err) {
        console.error('Error loading asset:', err);
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('notFoundState').style.display = 'block';
      }
    }

    async function submitIssueReport(assetId, orgId) {
      const btn = document.getElementById('submitReport');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      try {
        const description = document.getElementById('reportDesc').value.trim();
        const urgency = document.getElementById('reportUrgency').value;
        const name = document.getElementById('reportName').value.trim() || 'Anonymous';
        const contact = document.getElementById('reportContact').value.trim();
        const files = document.getElementById('reportPhotos').files;

        // Upload photos
        const photoUrls = [];
        if (files.length > 0) {
          for (let i = 0; i < files.length; i++) {
            const url = await uploadFile(files[i], `reports/${assetId}/${Date.now()}-${i}`);
            photoUrls.push(url);
          }
        }

        // Get asset for category suggestion
        const assetDoc = await getDoc(doc(db, 'assets', assetId));
        const assetData = assetDoc.data();

        // Create issue
        await addDoc(collection(db, 'issues'), {
          assetId,
          orgId,
          description,
          category: assetData?.category || '',
          urgency,
          status: 'reported',
          reportedBy: contact || name,
          reporterName: name,
          reporterContact: contact,
          photos: photoUrls,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        // Write service history
        await addDoc(collection(db, 'serviceHistory'), {
          assetId,
          orgId,
          action: 'reported',
          performedBy: name,
          notes: `Issue reported: ${description.substring(0, 100)}`,
          timestamp: serverTimestamp()
        });

        showToast('Issue reported successfully! Thank you for your report.', 'success');
        document.getElementById('reportForm').reset();
        document.getElementById('reportPhotoPreview').innerHTML = '';

      } catch (err) {
        console.error(err);
        showToast('Error submitting report. Please try again.', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Submit Report';
    }

    async function loadHistory(assetId) {
      const container = document.getElementById('historyList');
      try {
        const q = query(collection(db, 'serviceHistory'), where('assetId', '==', assetId), orderBy('timestamp', 'desc'));
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = '<div class="card"><div class="empty-state"><p>No service history yet</p></div></div>';
          return;
        }

        container.innerHTML = snap.docs.map(d => {
          const log = d.data();
          const actionColors = {
            reported: '#dc2626',
            triaged: '#f59e0b',
            assigned: '#2563eb',
            status_change: '#0891b2',
            resolved: '#16a34a',
            closed: '#64748b'
          };

          return `
            <div class="timeline-item">
              <div class="time">${formatDateTime(log.timestamp)}</div>
              <div class="content">
                <span style="display:inline-flex;align-items:center;gap:0.375rem;">
                  <span style="width:8px;height:8px;border-radius:50%;background:${actionColors[log.action] || '#64748b'};"></span>
                  <strong style="text-transform:capitalize;">${log.action.replace(/_/g, ' ')}</strong>
                </span>
                ${log.notes ? `<p style="color:#64748b;font-size:0.8125rem;margin-top:0.25rem;">${esc(log.notes)}</p>` : ''}
                <p style="color:#94a3b8;font-size:0.75rem;margin-top:0.25rem;">by ${esc(log.performedBy || 'System')}</p>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = '<p style="color:#64748b;text-align:center;padding:1rem;">Error loading history</p>';
      }
    }

    async function loadOpenIssues(assetId) {
      const container = document.getElementById('openIssuesList');
      try {
        const q = query(collection(db, 'issues'), where('assetId', '==', assetId));
        const snap = await getDocs(q);

        const openIssues = snap.docs.filter(d => {
          const status = d.data().status;
          return ['reported', 'triaged', 'assigned', 'in_progress'].includes(status);
        });

        if (openIssues.length === 0) {
          container.innerHTML = '<div class="card"><div class="empty-state"><p>No open issues for this asset</p></div></div>';
          return;
        }

        container.innerHTML = openIssues.map(d => {
          const issue = d.data();
          return `
            <div class="card" style="margin-bottom:0.75rem;">
              <div class="card-body">
                <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
                  ${statusBadge(issue.urgency || 'low')}
                  ${statusBadge(issue.status)}
                </div>
                <p style="font-size:0.875rem;">${esc(issue.description || 'No description')}</p>
                <p style="font-size:0.75rem;color:#94a3b8;margin-top:0.5rem;">Reported ${formatDateTime(issue.createdAt)}</p>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = '<p style="color:#64748b;text-align:center;padding:1rem;">Error loading issues</p>';
      }
    }
  </script>
</body>
</html>
