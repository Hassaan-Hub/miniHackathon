<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MaintainIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Dashboard</h2>
        <p style="color:#64748b;font-size:0.875rem;">Overview of your maintenance operations</p>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <a href="/assets.html" class="btn btn-primary btn-sm">+ Add Asset</a>
      </div>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem;">
      <div class="stat-card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div class="stat-value" id="stat-assets">-</div>
            <div class="stat-label">Total Assets</div>
          </div>
          <div style="width:48px;height:48px;background:#dbeafe;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" style="width:24px;height:24px;"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div class="stat-value" id="stat-open" style="color:#dc2626;">-</div>
            <div class="stat-label">Open Issues</div>
          </div>
          <div style="width:48px;height:48px;background:#fee2e2;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" style="width:24px;height:24px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div class="stat-value" id="stat-resolved" style="color:#16a34a;">-</div>
            <div class="stat-label">Resolved This Month</div>
          </div>
          <div style="width:48px;height:48px;background:#dcfce7;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" style="width:24px;height:24px;"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div class="stat-value" id="stat-critical" style="color:#f59e0b;">-</div>
            <div class="stat-label">Critical / Urgent</div>
          </div>
          <div style="width:48px;height:48px;background:#fef3c7;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="width:24px;height:24px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Preventive Alerts -->
    <div class="card" style="margin-bottom:1.5rem;" id="alerts-card">
      <div class="card-header">
        <h3 style="display:flex;align-items:center;gap:0.5rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="width:18px;height:18px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Preventive Alerts
        </h3>
      </div>
      <div class="card-body" id="alerts-list">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Recent Issues -->
    <div class="card" style="margin-bottom:1.5rem;">
      <div class="card-header">
        <h3>Recent Issues</h3>
        <a href="/issues.html" class="btn btn-secondary btn-sm">View All</a>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Issue</th>
              <th>Asset</th>
              <th>Status</th>
              <th>Urgency</th>
              <th>Reported</th>
            </tr>
          </thead>
          <tbody id="recent-issues">
            <tr><td colspan="5" style="text-align:center;padding:2rem;"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Technician Workload -->
    <div class="card" id="tech-card" style="display:none;">
      <div class="card-header">
        <h3>Technician Workload</h3>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Technician</th>
              <th>Assigned</th>
              <th>In Progress</th>
              <th>Resolved (30d)</th>
            </tr>
          </thead>
          <tbody id="tech-workload">
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from '/js/firebase-config.js';
    import { collection, query, where, onSnapshot, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { requireRole } from '/js/middleware.js';
    import { setupNav, populateUser, setupMobileMenu, getSidebar } from '/js/middleware.js';
    import { statusBadge, formatDate, esc } from '/js/utils.js';

    requireRole(['admin', 'manager'], async (user, userData) => {
      // Setup sidebar
      document.getElementById('sidebar').innerHTML = getSidebar('dashboard', userData.role);
      setupNav('dashboard');
      populateUser(userData);
      setupMobileMenu();

      const orgId = userData.orgId;

      // Real-time stats
      const assetsQuery = query(collection(db, 'assets'), where('orgId', '==', orgId));
      onSnapshot(assetsQuery, (snap) => {
        document.getElementById('stat-assets').textContent = snap.size;
      });

      const openStatuses = ['reported', 'triaged', 'assigned', 'in_progress'];
      const issuesQuery = query(collection(db, 'issues'), where('orgId', '==', orgId));
      onSnapshot(issuesQuery, (snap) => {
        let open = 0, critical = 0, resolved = 0;
        const now = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

        snap.forEach(doc => {
          const d = doc.data();
          if (openStatuses.includes(d.status)) {
            open++;
            if (d.urgency === 'critical' || d.urgency === 'high') critical++;
          }
          if (d.status === 'resolved' || d.status === 'closed') {
            const resolvedDate = d.resolvedAt?.toDate?.() || d.updatedAt?.toDate?.();
            if (resolvedDate && resolvedDate >= monthStart) resolved++;
          }
        });

        document.getElementById('stat-open').textContent = open;
        document.getElementById('stat-resolved').textContent = resolved;
        document.getElementById('stat-critical').textContent = critical;
      });

      // Recent issues
      const recentQuery = query(
        collection(db, 'issues'),
        where('orgId', '==', orgId)
      );

      onSnapshot(recentQuery, (snap) => {
        const sorted = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0))
          .slice(0, 5);

        const tbody = document.getElementById('recent-issues');
        if (sorted.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><p>No issues yet</p></td></tr>';
          return;
        }

        const assetIds = [...new Set(sorted.map(d => d.assetId).filter(Boolean))];
        Promise.all(assetIds.map(id => getDoc(doc(db, 'assets', id)))).then(assetSnaps => {
          const assetMap = {};
          assetSnaps.forEach(s => { if (s.exists()) assetMap[s.id] = s.data().name; });

          tbody.innerHTML = sorted.map(data => {
            return `<tr>
              <td style="font-weight:500;">${esc(data.description?.substring(0, 50) || 'Issue')}</td>
              <td>${esc(assetMap[data.assetId] || data.assetId)}</td>
              <td>${statusBadge(data.status)}</td>
              <td>${statusBadge(data.urgency || 'low')}</td>
              <td style="color:#64748b;font-size:0.8125rem;">${formatDate(data.createdAt)}</td>
            </tr>`;
          }).join('');
        });
      });

      // Preventive alerts
      loadPreventiveAlerts(orgId);

      // Technician workload
      loadTechWorkload(orgId);
    });

    async function loadPreventiveAlerts(orgId) {
      const container = document.getElementById('alerts-list');
      const assetsSnap = await getDocs(query(collection(db, 'assets'), where('orgId', '==', orgId)));
      const issuesSnap = await getDocs(query(collection(db, 'issues'), where('orgId', '==', orgId)));

      const issuesByAsset = {};
      issuesSnap.forEach(d => {
        const data = d.data();
        if (!issuesByAsset[data.assetId]) issuesByAsset[data.assetId] = [];
        issuesByAsset[data.assetId].push(data);
      });

      const alerts = [];
      const ninetyDaysAgo = new Date(Date.now() - 90 * 24 * 60 * 60 * 1000);

      assetsSnap.forEach(d => {
        const asset = d.data();
        const assetIssues = issuesByAsset[d.id] || [];

        // Rule 1: 3+ issues in same category in 90 days
        const recentIssues = assetIssues.filter(i => {
          const created = i.createdAt?.toDate?.() || new Date();
          return created >= ninetyDaysAgo;
        });

        if (recentIssues.length >= 3) {
          alerts.push({
            assetId: d.id,
            assetName: asset.name,
            message: `${recentIssues.length} issues in the last 90 days — recommend inspection`,
            type: 'warning'
          });
        }

        // Rule 2: Not serviced in 6 months
        const lastServiced = assetIssues
          .filter(i => i.status === 'resolved' || i.status === 'closed')
          .sort((a, b) => (b.resolvedAt?.toMillis?.() || 0) - (a.resolvedAt?.toMillis?.() || 0))[0];

        if (lastServiced) {
          const lastDate = lastServiced.resolvedAt?.toDate?.() || new Date();
          const monthsAgo = (Date.now() - lastDate.getTime()) / (30 * 24 * 60 * 60 * 1000);
          if (monthsAgo > 6) {
            alerts.push({
              assetId: d.id,
              assetName: asset.name,
              message: `Last serviced ${Math.floor(monthsAgo)} months ago — preventive check recommended`,
              type: 'info'
            });
          }
        }

        // Rule 3: Warranty expiring soon
        if (asset.warrantyExpiry) {
          const warrantyDate = asset.warrantyExpiry?.toDate?.() || new Date(asset.warrantyExpiry);
          const daysUntilExpiry = (warrantyDate - Date.now()) / (24 * 60 * 60 * 1000);
          if (daysUntilExpiry > 0 && daysUntilExpiry < 90) {
            alerts.push({
              assetId: d.id,
              assetName: asset.name,
              message: `Warranty expires in ${Math.floor(daysUntilExpiry)} days`,
              type: 'warning'
            });
          }
        }
      });

      if (alerts.length === 0) {
        container.innerHTML = '<p style="color:#64748b;font-size:0.875rem;">No alerts at this time. All assets are in good shape.</p>';
        return;
      }

      container.innerHTML = alerts.map(a => `
        <div style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:0.5rem;margin-bottom:0.5rem;background:${a.type === 'warning' ? '#fef3c7' : '#dbeafe'};">
          <svg viewBox="0 0 24 24" fill="none" stroke="${a.type === 'warning' ? '#f59e0b' : '#2563eb'}" stroke-width="2" style="width:20px;height:20px;flex-shrink:0;">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <div>
            <a href="/asset-detail.html?id=${a.assetId}" style="font-weight:600;font-size:0.875rem;text-decoration:none;color:#0f172a;">${esc(a.assetName)}</a>
            <p style="font-size:0.8125rem;color:#475569;">${esc(a.message)}</p>
          </div>
        </div>
      `).join('');
    }

    async function loadTechWorkload(orgId) {
      const techSnap = await getDocs(query(collection(db, 'users'), where('orgId', '==', orgId), where('role', '==', 'technician')));
      if (techSnap.empty) return;

      document.getElementById('tech-card').style.display = 'block';
      const tbody = document.getElementById('tech-workload');
      const allIssues = await getDocs(query(collection(db, 'issues'), where('orgId', '==', orgId)));
      const issuesList = allIssues.docs.map(d => d.data());

      const techRows = techSnap.docs.map(d => {
        const tech = d.data();
        const myIssues = issuesList.filter(i => i.assignedTo === d.id);
        const assigned = myIssues.filter(i => i.status === 'assigned').length;
        const inProgress = myIssues.filter(i => i.status === 'in_progress').length;
        const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
        const resolved = myIssues.filter(i => {
          if (i.status !== 'resolved' && i.status !== 'closed') return false;
          const d = i.resolvedAt?.toDate?.() || new Date();
          return d >= thirtyDaysAgo;
        }).length;

        return `<tr>
          <td style="font-weight:500;">${esc(tech.name || tech.email)}</td>
          <td><span class="badge badge-info">${assigned}</span></td>
          <td><span class="badge badge-primary">${inProgress}</span></td>
          <td><span class="badge badge-success">${resolved}</span></td>
        </tr>`;
      }).join('');

      tbody.innerHTML = techRows;
    }
  </script>
</body>
</html>
