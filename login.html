<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MaintainIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>MaintainIQ</h1>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn" style="margin-top:0.5rem;">
          Sign In
        </button>

        <p style="text-align:center;margin-top:1.25rem;font-size:0.875rem;color:#64748b;">
          Don't have an account? <a href="/signup.html" style="color:#2563eb;font-weight:500;text-decoration:none;">Sign up</a>
        </p>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth } from '/js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { showToast } from '/js/utils.js';

    // Redirect if already logged in
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = '/dashboard.html';
    });

    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await signInWithEmailAndPassword(auth, email, password);
        showToast('Login successful!', 'success');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);
      } catch (err) {
        console.error(err);
        let msg = 'Login failed. Check your credentials.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
        showToast(msg, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
