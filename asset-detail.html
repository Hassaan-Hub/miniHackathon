<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Detail — MaintainIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div id="loading" style="text-align:center;padding:3rem;">
      <div class="spinner"></div>
    </div>

    <div id="content" style="display:none;">
      <!-- Header -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
        <div>
          <a href="/assets.html" style="font-size:0.8125rem;color:#64748b;text-decoration:none;display:flex;align-items:center;gap:0.25rem;margin-bottom:0.5rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Assets
          </a>
          <h2 id="assetName" style="font-size:1.5rem;font-weight:700;"></h2>
          <p style="color:#64748b;font-size:0.875rem;" id="assetLocation"></p>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <button class="btn btn-secondary btn-sm" id="viewQrBtn">View QR</button>
          <a class="btn btn-primary btn-sm" id="publicLink" href="#" target="_blank">Public Page</a>
        </div>
      </div>

      <!-- Asset Info -->
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:1.5rem;margin-bottom:1.5rem;">
        <!-- Photo -->
        <div class="card">
          <div id="assetPhoto" style="height:200px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;border-radius:0.75rem;overflow:hidden;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="width:48px;height:48px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
        </div>

        <!-- Details -->
        <div class="card">
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
              <span class="asset-status-indicator" id="assetStatus"></span>
              <span class="badge badge-secondary" id="assetCategory"></span>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;font-size:0.875rem;">
              <div>
                <div style="color:#64748b;margin-bottom:0.25rem;">Location</div>
                <div style="font-weight:500;" id="detailLocation">-</div>
              </div>
              <div>
                <div style="color:#64748b;margin-bottom:0.25rem;">Install Date</div>
                <div style="font-weight:500;" id="detailInstall">-</div>
              </div>
              <div>
                <div style="color:#64748b;margin-bottom:0.25rem;">Warranty Expiry</div>
                <div style="font-weight:500;" id="detailWarranty">-</div>
              </div>
              <div>
                <div style="color:#64748b;margin-bottom:0.25rem;">Total Issues</div>
                <div style="font-weight:500;" id="detailTotalIssues">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Preventive Recommendations -->
      <div class="card" style="margin-bottom:1.5rem;" id="recommendationsCard">
        <div class="card-header">
          <h3 style="display:flex;align-items:center;gap:0.5rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="width:18px;height:18px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Preventive Recommendations
          </h3>
        </div>
        <div class="card-body" id="recommendations">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Issue History -->
      <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-header">
          <h3>Issue History</h3>
          <a href="/issues.html" class="btn btn-secondary btn-sm">All Issues</a>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Description</th>
                <th>Status</th>
                <th>Urgency</th>
                <th>Assigned To</th>
                <th>Cost</th>
                <th>Reported</th>
                <th>Resolved</th>
              </tr>
            </thead>
            <tbody id="issueHistory">
              <tr><td colspan="8" style="text-align:center;padding:2rem;"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Service Timeline -->
      <div class="card">
        <div class="card-header">
          <h3>Service Timeline</h3>
        </div>
        <div class="card-body" id="serviceTimeline">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal" style="max-width:380px;">
      <div class="modal-header">
        <h3>Asset QR Code</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="qr-display" id="qrDisplay"></div>
        <p style="text-align:center;font-size:0.8125rem;color:#64748b;margin-top:0.75rem;">Scan to view asset & report issues</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from '/js/firebase-config.js';
    import { doc, getDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { requireAuth } from '/js/middleware.js';
    import { setupNav, populateUser, setupMobileMenu, getSidebar } from '/js/middleware.js';
    import { showToast, statusBadge, esc, formatDate, formatDateTime, openModal, setupModals } from '/js/utils.js';

    const params = new URLSearchParams(window.location.search);
    const assetId = params.get('id');

    if (!assetId) {
      window.location.href = '/assets.html';
    }

    requireAuth(async (user, userData) => {
      document.getElementById('sidebar').innerHTML = getSidebar('assets', userData.role);
      setupNav('assets');
      populateUser(userData);
      setupMobileMenu();
      setupModals();

      if (!assetId) return;

      try {
        const assetDoc = await getDoc(doc(db, 'assets', assetId));
        if (!assetDoc.exists()) {
          window.location.href = '/assets.html';
          return;
        }

        const asset = assetDoc.data();
        document.getElementById('content').style.display = 'block';
        document.getElementById('loading').style.display = 'none';

        // Fill details
        document.getElementById('assetName').textContent = asset.name;
        document.getElementById('assetLocation').textContent = asset.location || '';
        document.title = `${asset.name} — MaintainIQ`;

        const statusEl = document.getElementById('assetStatus');
        statusEl.textContent = (asset.status || 'operational').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        statusEl.className = `asset-status-indicator ${asset.status || 'operational'}`;
        document.getElementById('assetCategory').textContent = asset.category || 'N/A';
        document.getElementById('detailLocation').textContent = asset.location || 'N/A';
        document.getElementById('detailInstall').textContent = asset.installDate || 'N/A';
        document.getElementById('detailWarranty').textContent = asset.warrantyExpiry || 'N/A';

        if (asset.photoUrl) {
          document.getElementById('assetPhoto').innerHTML = `<img src="${asset.photoUrl}" style="width:100%;height:200px;object-fit:cover;">`;
        }

        const publicUrl = `/asset.html?id=${assetId}`;
        document.getElementById('publicLink').href = publicUrl;

        // QR code
        const QRScript = document.createElement('script');
        QRScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        document.head.appendChild(QRScript);

        document.getElementById('viewQrBtn').addEventListener('click', () => {
          const display = document.getElementById('qrDisplay');
          display.innerHTML = '';
          const generateQR = () => {
            if (typeof QRCode === 'undefined') { setTimeout(generateQR, 100); return; }
            new QRCode(display, { text: window.location.origin + publicUrl, width: 200, height: 200, colorDark: '#0f172a', colorLight: '#ffffff' });
          };
          generateQR();
          openModal('qrModal');
        });

        // Load issues
        const issuesSnap = await getDocs(query(collection(db, 'issues'), where('assetId', '==', assetId), orderBy('createdAt', 'desc')));
        document.getElementById('detailTotalIssues').textContent = issuesSnap.size;

        const techIds = [...new Set(issuesSnap.docs.map(d => d.data().assignedTo).filter(Boolean))];
        const techMap = {};
        await Promise.all(techIds.map(async id => {
          const uDoc = await getDoc(doc(db, 'users', id));
          if (uDoc.exists()) techMap[id] = uDoc.data();
        }));

        const issuesTbody = document.getElementById('issueHistory');
        if (issuesSnap.empty) {
          issuesTbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><p>No issues reported yet</p></div></td></tr>';
        } else {
          issuesTbody.innerHTML = issuesSnap.docs.map(d => {
            const i = d.data();
            const tech = techMap[i.assignedTo] || {};
            return `<tr>
              <td><code style="background:#f1f5f9;padding:0.125rem 0.375rem;border-radius:0.25rem;font-size:0.75rem;">${d.id.substring(0, 6).toUpperCase()}</code></td>
              <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(i.description || '')}</td>
              <td>${statusBadge(i.status)}</td>
              <td>${statusBadge(i.urgency || 'low')}</td>
              <td>${tech.name ? esc(tech.name) : '<span style="color:#94a3b8;">-</span>'}</td>
              <td>${i.cost ? `$${i.cost.toFixed(2)}` : '-'}</td>
              <td style="font-size:0.8125rem;color:#64748b;">${formatDate(i.createdAt)}</td>
              <td style="font-size:0.8125rem;color:#64748b;">${formatDate(i.resolvedAt)}</td>
            </tr>`;
          }).join('');
        }

        // Load service history
        const historySnap = await getDocs(query(collection(db, 'serviceHistory'), where('assetId', '==', assetId), orderBy('timestamp', 'desc')));
        const timeline = document.getElementById('serviceTimeline');

        if (historySnap.empty) {
          timeline.innerHTML = '<p style="color:#64748b;text-align:center;">No service history yet</p>';
        } else {
          const actionColors = { reported: '#dc2626', triaged: '#f59e0b', assigned: '#2563eb', status_change: '#0891b2', resolved: '#16a34a', closed: '#64748b' };
          timeline.innerHTML = historySnap.docs.map(d => {
            const log = d.data();
            return `
              <div class="timeline-item">
                <div class="time">${formatDateTime(log.timestamp)}</div>
                <div class="content">
                  <span style="display:inline-flex;align-items:center;gap:0.375rem;">
                    <span style="width:8px;height:8px;border-radius:50%;background:${actionColors[log.action] || '#64748b'};"></span>
                    <strong style="text-transform:capitalize;">${(log.action || '').replace(/_/g, ' ')}</strong>
                  </span>
                  ${log.notes ? `<p style="color:#64748b;font-size:0.8125rem;margin-top:0.25rem;">${esc(log.notes)}</p>` : ''}
                  <p style="color:#94a3b8;font-size:0.75rem;margin-top:0.25rem;">by ${esc(log.performedBy || 'System')}</p>
                </div>
              </div>
            `;
          }).join('');
        }

        // Preventive recommendations
        loadRecommendations(assetId, asset, issuesSnap.docs.map(d => d.data()));

      } catch (err) {
        console.error(err);
        showToast('Error loading asset details', 'error');
      }
    });

    function loadRecommendations(assetId, asset, issues) {
      const container = document.getElementById('recommendations');
      const alerts = [];
      const ninetyDaysAgo = new Date(Date.now() - 90 * 24 * 60 * 60 * 1000);

      const recentIssues = issues.filter(i => {
        const created = i.createdAt?.toDate?.() || new Date();
        return created >= ninetyDaysAgo;
      });

      if (recentIssues.length >= 3) {
        alerts.push({ type: 'warning', message: `This asset has had ${recentIssues.length} issues in the last 90 days. A thorough inspection is recommended.` });
      }

      const resolvedIssues = issues.filter(i => i.status === 'resolved' || i.status === 'closed');
      if (resolvedIssues.length > 0) {
        const lastResolved = resolvedIssues.sort((a, b) => (b.resolvedAt?.toMillis?.() || 0) - (a.resolvedAt?.toMillis?.() || 0))[0];
        const lastDate = lastResolved.resolvedAt?.toDate?.() || new Date();
        const monthsAgo = (Date.now() - lastDate.getTime()) / (30 * 24 * 60 * 60 * 1000);

        if (monthsAgo > 6) {
          alerts.push({ type: 'info', message: `Last serviced ${Math.floor(monthsAgo)} months ago. Preventive maintenance check recommended.` });
        }
      }

      if (asset.warrantyExpiry) {
        const warrantyDate = new Date(asset.warrantyExpiry);
        const daysUntil = (warrantyDate - Date.now()) / (24 * 60 * 60 * 1000);
        if (daysUntil > 0 && daysUntil < 90) {
          alerts.push({ type: 'warning', message: `Warranty expires in ${Math.floor(daysUntil)} days. Schedule any needed covered repairs soon.` });
        } else if (daysUntil < 0) {
          alerts.push({ type: 'info', message: 'Warranty has expired. Budget for potential repair costs.' });
        }
      }

      // Check for recurring issue categories
      const catCounts = {};
      issues.forEach(i => { if (i.category) catCounts[i.category] = (catCounts[i.category] || 0) + 1; });
      Object.entries(catCounts).forEach(([cat, count]) => {
        if (count >= 3) {
          alerts.push({ type: 'warning', message: `${count} ${cat}-related issues on record. Consider root cause analysis for this category.` });
        }
      });

      if (alerts.length === 0) {
        container.innerHTML = '<p style="color:#64748b;font-size:0.875rem;">No recommendations at this time. Asset is in good standing.</p>';
        return;
      }

      container.innerHTML = alerts.map(a => `
        <div style="display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem;border-radius:0.5rem;margin-bottom:0.5rem;background:${a.type === 'warning' ? '#fef3c7' : '#dbeafe'};">
          <svg viewBox="0 0 24 24" fill="none" stroke="${a.type === 'warning' ? '#f59e0b' : '#2563eb'}" stroke-width="2" style="width:20px;height:20px;flex-shrink:0;margin-top:2px;">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <p style="font-size:0.875rem;">${esc(a.message)}</p>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
